<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="apple-mobile-web-app-title" content="{{ title }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <link rel="stylesheet" href="/static/index.css" />
    <title>{{ title }}</title>
  </head>
  <body>
    <h1>{{ title }}</h1>
    <a href="{{ url }}">{{ url }}</a>
    <form id="api-form" class="card gap-1-25">
      <fieldset class="form-group">
        <legend>Drag and drop or paste your Gemini CLI credentials</legend>
        <div class="input-wrapper">
          <label for="creds">Raw JSON data (values can be in any order):</label>
          <textarea
            id="creds"
            name="creds"
            class="input-text"
            rows="8"
            placeholder="{{ placeholder }}"
            spellcheck="false"
            required
          ></textarea>
        </div>
      </fieldset>
      <fieldset class="form-group">
        <div class="input-wrapper">
          <label for="model">Model for validation:</label>
          <input
            id="model"
            name="model"
            class="input-text"
            type="text"
            placeholder="gemini-..."
            value="gemini-2.5-flash-lite"
            spellcheck="false"
            required
          />
        </div>
      </fieldset>
      <hr />
      <fieldset class="form-group">
        <button id="submit" type="submit" class="submit-btn">Create API Key</button>
      </fieldset>
    </form>
    <div id="api-result" class="card hidden!">
      <p>Your API key is:</p>
      <pre id="api-result-data">undefined</pre>
      <p>
        This API key is unique to this proxy (<a href="{{ url }}">{{ url }}</a>) and will not work
        on others. If you switch to another proxy, you will have to create a new API key for it.
      </p>
    </div>
    <div id="api-error" class="card hidden!">
      <p id="api-error-message" style="color: #f86a6a">Error.</p>
      <p id="api-error-extra" class="hidden!" style="color: #f86a6a">Error.</p>
    </div>
    <script>
      const formElement = document.getElementById("api-form");
      const credsElement = document.getElementById("creds");
      const modelElement = document.getElementById("model");
      const submitButtonElement = document.getElementById("submit");
      const resultElement = document.getElementById("api-result");
      const resultDataElement = document.getElementById("api-result-data");
      const errorElement = document.getElementById("api-error");
      const errorMessageElement = document.getElementById("api-error-message");
      const errorExtraElement = document.getElementById("api-error-extra");

      // Generated by Gemini 3.1 Pro Preview on Google AI Studio:
      // --- DRAG AND DROP SUPPORT START ---

      // Prevent default behavior (Prevent file from being opened in the browser tab)
      ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
        credsElement.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            e.stopPropagation();
          },
          false,
        );
      });

      // Highlight the textarea when a file is hovered over it
      ["dragenter", "dragover"].forEach((eventName) => {
        credsElement.addEventListener(
          eventName,
          () => {
            credsElement.style.border = "3px dashed #7f5ad588";
            credsElement.style.backgroundColor = "#24283a";
          },
          false,
        );
      });

      // Remove the highlight when the file is dragged away or dropped
      ["dragleave", "drop"].forEach((eventName) => {
        credsElement.addEventListener(
          eventName,
          () => {
            credsElement.style.border = "";
            credsElement.style.backgroundColor = "";
          },
          false,
        );
      });

      // Handle the file drop
      credsElement.addEventListener(
        "drop",
        (e) => {
          const files = e.dataTransfer.files;
          if (files && files.length > 0) {
            const file = files[0];
            const reader = new FileReader();

            // Once the file is read, populate the textarea
            reader.onload = (event) => {
              credsElement.value = event.target.result;
            };

            // Read the file as text
            reader.readAsText(file);
          }
        },
        false,
      );

      // --- DRAG AND DROP SUPPORT END ---

      formElement.onsubmit = async (event) => {
        event.preventDefault();

        submitButtonElement.disabled = true;
        resultElement.classList.add("hidden!");
        errorElement.classList.add("hidden!");

        try {
          const response = await fetch("/keyring/api", {
            method: "POST",
            body: JSON.stringify({
              creds: JSON.parse(credsElement.value),
              credsType: "gemini_cli",
              model: modelElement.value,
            }),
            headers: {
              "Content-Type": "application/json",
            },
          });

          const result = await response.json();
          if (result.error) {
            if (result.extra) {
              if (result.extra.startsWith("Verify your account: ")) {
                const url = result.extra.replace("Verify your account: ", "");
                const anchor = document.createElement("a");
                anchor.href = url;
                anchor.style.wordBreak = "break-all";
                anchor.textContent = url;

                errorExtraElement.textContent = "Verify your account and try again:";
                errorExtraElement.appendChild(document.createElement("br"));
                errorExtraElement.appendChild(anchor);
              } else {
                errorExtraElement.textContent = result.extra;
              }
              errorExtraElement.classList.remove("hidden!");
            } else {
              errorExtraElement.classList.add("hidden!");
            }

            throw new Error(result.error);
          }

          resultElement.classList.remove("hidden!");
          resultDataElement.textContent = result.value;
        } catch (error) {
          errorElement.classList.remove("hidden!");
          errorMessageElement.textContent = error.message;
        }

        submitButtonElement.disabled = false;
      };
    </script>
  </body>
</html>
